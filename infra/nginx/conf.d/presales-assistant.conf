server {
  listen 8088;
  server_name _;

  client_max_body_size 256m;

  set $forwarded_host $http_host;

  location / {
    proxy_pass http://frontend:3000;
    proxy_set_header Host              $forwarded_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $forwarded_host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_redirect off;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
  }

  location /auth_service/ {
    proxy_pass http://auth_service:8001/;
    proxy_set_header Host              $forwarded_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $forwarded_host;
    proxy_set_header X-Forwarded-Port  $server_port;
  }

  location /presale_service/ {
    proxy_pass http://presale_service:8002/;
    proxy_set_header Host              $forwarded_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $forwarded_host;
    proxy_set_header X-Forwarded-Port  $server_port;
  }

  location /ai_service/ {
    proxy_pass http://ai_service:8003/;
    proxy_set_header Host              $forwarded_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $forwarded_host;
    proxy_set_header X-Forwarded-Port  $server_port;
  }

  location /minio/ {
    rewrite ^/minio/(.*)$ /$1 break;
    proxy_pass http://minio:9000;
    proxy_set_header Host              $forwarded_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $forwarded_host;
    proxy_set_header X-Forwarded-Port  $server_port;
  }
}
